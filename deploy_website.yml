---
- name: Deploy New Landing Page to Apache VM
  hosts: apache_servers
  become: yes
  tasks:
    - name: Ensure Apache is installed
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Copy landing page HTML file
      copy:
        src: index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Ensure Apache service is running and enabled
      service:
        name: apache2
        state: started
        enabled: yes
